<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PenuX-Omni Max | Turbo Edition</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgpu/dist/tf-backend-webgpu.js"></script>
  <style>
    :root { --neon: #00ffcc; --bg: #050507; --panel: #0f111a; }
    body { background: var(--bg); color: #e2e8f0; font-family: 'JetBrains Mono', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
    
    .sidebar { width: 360px; background: var(--panel); border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
    .content { flex: 1; padding: 25px; overflow-y: auto; scroll-behavior: smooth; }

    /* Performance Stats */
    .perf-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    .stat { flex: 1; background: #161821; padding: 10px; border-radius: 8px; border: 1px solid #222; text-align: center; }
    .stat b { display: block; color: var(--neon); font-size: 1.2rem; }
    .stat span { font-size: 0.6rem; text-transform: uppercase; color: #64748b; }

    /* Control Knobs */
    .control-group { background: #161821; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
    input[type="range"] { width: 100%; accent-color: var(--neon); cursor: crosshair; }
    .label-row { display: flex; justify-content: space-between; font-size: 0.75rem; margin-bottom: 5px; }

    /* Pathogen Matrix (Virtual Grid) */
    .matrix { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
    .cell { background: #0d0e14; border: 1px solid #1a1a24; padding: 10px; border-radius: 6px; font-size: 0.7rem; transition: 0.1s; opacity: 0.6; }
    .cell.hit { background: var(--neon); color: #000; opacity: 1; font-weight: bold; box-shadow: 0 0 15px var(--neon); }

    button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 0.9rem; margin-top: 10px; }
    .btn-turbo { background: var(--neon); color: #000; text-transform: uppercase; }
    .btn-turbo:hover { transform: scale(1.02); filter: brightness(1.1); }
    .btn-turbo:disabled { opacity: 0.1; }

    #log { background: #000; color: #00ff00; font-size: 10px; height: 120px; overflow-y: auto; padding: 10px; border-radius: 4px; margin-top: auto; }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div style="margin-bottom:20px;">
      <h2 style="margin:0; color:var(--neon); font-size:1.2rem;">PENUX TURBO</h2>
      <small style="opacity:0.5;">v5.5 | netanelcyber-kernel</small>
    </div>

    <div class="perf-bar">
      <div class="stat"><b id="latency">--</b><span>Latency (ms)</span></div>
      <div class="stat"><b id="backend">WAIT</b><span>Engine</span></div>
    </div>

    <div class="control-group">
      <div class="label-row"><span>Proteomic Flux</span> <b id="v1">0.8</b></div>
      <input type="range" id="i1" min="0" max="1" step="0.01" value="0.8">
    </div>

    <div class="control-group">
      <div class="label-row"><span>PCT Level</span> <b id="v2">4.2</b></div>
      <input type="range" id="i2" min="0" max="30" step="0.1" value="4.2">
    </div>

    <button id="bootBtn" class="btn-turbo" style="background:#222; color:#fff; margin-bottom:8px;">Boot WebGPU Kernel</button>
    <button id="runBtn" class="btn-turbo" disabled>Instant Inference</button>

    <div id="log">> System Standby...</div>
  </aside>

  <main class="content">
    <h3 style="margin-top:0; color:var(--neon);">100-Pathogen Classification Matrix</h3>
    <div class="matrix" id="pMatrix"></div>
  </main>

<script>
  let model;
  const logger = document.getElementById('log');
  const pathogenList = Array.from({length: 100}, (_, i) => `P-${(i+1).toString().padStart(3, '0')}`);

  function log(msg) {
    logger.innerHTML += `<div>> ${msg}</div>`;
    logger.scrollTop = logger.scrollHeight;
  }

  // Build Matrix UI
  const matrix = document.getElementById('pMatrix');
  pathogenList.forEach((name, i) => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.id = `cell-${i}`;
    div.innerText = name;
    matrix.appendChild(div);
  });

  // UI Sync
  ['i1','i2'].forEach(id => {
    document.getElementById(id).oninput = e => document.getElementById(id.replace('i','v')).innerText = e.target.value;
  });

  // Turbo Boot (WebGPU)
  document.getElementById('bootBtn').onclick = async function() {
    this.disabled = true;
    log("Requesting WebGPU Device...");
    
    try {
      await tf.setBackend('webgpu');
      document.getElementById('backend').innerText = "WEBGPU";
    } catch(e) {
      log("WebGPU not found. Falling back to WASM/WebGL.");
      await tf.setBackend('webgl');
      document.getElementById('backend').innerText = "WEBGL";
    }

    log("Compiling 1K-LSTM Hybrid Architecture...");
    
    model = tf.sequential();
    model.add(tf.layers.lstm({units: 64, inputShape: [1, 2], returnSequences: false}));
    model.add(tf.layers.dense({units: 1024, activation: 'relu'}));
    model.add(tf.layers.dense({units: 100, activation: 'softmax'}));

    // Warm-up (הפעלה ראשונית כדי "לחמם" את ה-GPU)
    tf.tidy(() => model.predict(tf.zeros([1, 1, 2])));
    
    log("Kernel Warm-up complete.");
    document.getElementById('runBtn').disabled = false;
    this.innerText = "Kernel Live";
  };

  document.getElementById('runBtn').onclick = async function() {
    const startTime = performance.now();
    
    const vals = [
      parseFloat(document.getElementById('i1').value),
      parseFloat(document.getElementById('i2').value)
    ];

    // שימוש ב-tf.tidy לניקוי זיכרון מיידי
    const resultIdx = tf.tidy(() => {
      const input = tf.tensor3d([[vals]]);
      const pred = model.predict(input);
      return pred.argMax(-1).dataSync()[0];
    });

    // עדכון ה-UI באופן מיידי
    document.querySelectorAll('.cell').forEach(c => c.classList.remove('hit'));
    document.getElementById(`cell-${resultIdx}`).classList.add('hit');
    
    const endTime = performance.now();
    document.getElementById('latency').innerText = (endTime - startTime).toFixed(1);
    
    log(`Inference: P-${resultIdx+1} detected in ${(endTime - startTime).toFixed(2)}ms`);
  };
</script>
</body>
</html>
