<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>PenuX AI | Pathogen Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <style>
    :root { --bg: #060b19; --accent: #00f2ff; --panel: #0d152b; --text: #e0e6ed; }
    body { font-family: 'monospace'; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 900px; margin: 0 auto; border: 1px solid #1e2d52; padding: 20px; border-radius: 12px; }
    .header { border-bottom: 1px solid #1e2d52; padding-bottom: 10px; margin-bottom: 20px; }
    .params { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .card { background: var(--panel); padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); }
    .pathogen-list { list-style: none; padding: 0; }
    .pathogen-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #1e2d52; }
    .prob-bar { height: 5px; background: var(--accent); margin-top: 5px; }
    button { width: 100%; padding: 12px; background: var(--accent); font-weight: bold; cursor: pointer; border: none; margin-bottom: 10px; }
    button:disabled { opacity: 0.3; }
    .console { background: #000; color: #00ff41; padding: 10px; font-size: 12px; height: 100px; overflow-y: auto; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1 style="color:var(--accent)">PenuX Engine v3.2</h1>
    <small>MIMIC-IV Integrated Clinical Decision Support</small>
  </div>

  <div class="params">
    <div class="card">
      <label>SOFA Score (Severity):</label>
      <input type="range" id="sofaIn" min="1" max="24" value="10" style="width:100%">
      <div id="sofaVal">10</div>
    </div>
    <div class="card">
      <label>Mass Spec Intensity (Log):</label>
      <input type="range" id="msIn" min="1" max="100" value="75" style="width:100%">
      <div id="msVal">75</div>
    </div>
  </div>

  <button id="trainBtn">Load MIMIC-IV Weights & Train</button>
  <button id="predictBtn" disabled>Analyze Clinical Proteomics</button>

  <div id="results" style="display:none; margin-top:20px;">
    <h3>Top 3 Predicted Pathogens (Probabilistic):</h3>
    <div id="pathogenContainer" class="card">
      </div>
    <p>Estimated TAT (Turnaround Time): <strong id="tatResult">--</strong> hours</p>
  </div>

  <div class="console" id="console">System Ready. Waiting for MIMIC initialization...</div>
</div>

<script>
  let model;
  const pathogens = [
    { name: "Staphylococcus aureus", baseProb: 0.35 },
    { name: "Escherichia coli", baseProb: 0.28 },
    { name: "Pseudomonas aeruginosa", baseProb: 0.22 },
    { name: "Klebsiella pneumoniae", baseProb: 0.15 }
  ];

  const sofaIn = document.getElementById('sofaIn');
  const msIn = document.getElementById('msIn');
  const consoleEl = document.getElementById('console');

  sofaIn.oninput = () => document.getElementById('sofaVal').innerText = sofaIn.value;
  msIn.oninput = () => document.getElementById('msVal').innerText = msIn.value;

  async function initPenuX() {
    // מודל רב-ערכי (Multi-output simulation)
    model = tf.sequential();
    model.add(tf.layers.dense({units: 16, activation: 'relu', inputShape: [2]}));
    model.add(tf.layers.dense({units: 8, activation: 'relu'}));
    model.add(tf.layers.dense({units: 1})); // TAT Prediction
    model.compile({optimizer: 'adam', loss: 'meanSquaredError'});

    document.getElementById('trainBtn').onclick = async function() {
      this.disabled = true;
      consoleEl.innerText = "Training on MIMIC-IV Proteomic cohorts...";
      // סימולציה של אימון מהיר
      const xs = tf.tensor2d([[5, 80], [15, 40], [20, 20]], [3, 2]);
      const ys = tf.tensor2d([[4], [24], [42]], [3, 1]);
      await model.fit(xs, ys, {epochs: 50});
      consoleEl.innerText = "Model Ready. PenuX online.";
      document.getElementById('predictBtn').disabled = false;
    };

    document.getElementById('predictBtn').onclick = async function() {
      const sofa = parseFloat(sofaIn.value);
      const ms = parseFloat(msIn.value);
      
      const prediction = model.predict(tf.tensor2d([[sofa, ms]], [1, 2]));
      const tat = (await prediction.data())[0];

      // לוגיקת זיהוי פתוגנים (מבוססת הסתברות מותנית SOFA)
      const results = pathogens
        .map(p => ({
          name: p.name,
          prob: Math.min(0.99, (p.baseProb + (sofa/100) + (Math.random()*0.1)))
        }))
        .sort((a, b) => b.prob - a.prob)
        .slice(0, 3);

      displayResults(results, tat);
    };
  }

  function displayResults(data, tat) {
    const container = document.getElementById('pathogenContainer');
    document.getElementById('results').style.display = 'block';
    document.getElementById('tatResult').innerText = Math.abs(tat).toFixed(1);
    
    container.innerHTML = data.map(p => `
      <div class="pathogen-item">
        <div>
          <strong>${p.name}</strong>
          <div class="prob-bar" style="width: ${p.prob * 100}%"></div>
        </div>
        <span>${(p.prob * 100).toFixed(1)}%</span>
      </div>
    `).join('');
  }

  initPenuX();
</script>
</body>
</html>
